services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: knicksiq
      POSTGRES_PASSWORD: knicksiq
      POSTGRES_DB: knicksiq
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knicksiq -d knicksiq"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.18.0@sha256:b3063c673f3973877c038eeecc392bad5011f072ee7892b56c9a8e204a3bdea9
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data_v118:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "timeout 3 bash -c '</dev/tcp/127.0.0.1/6333'"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      DB_URL: postgresql+asyncpg://knicksiq:knicksiq@postgres:5432/knicksiq
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: ${QDRANT_URL:-}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      RAG_QDRANT_ENABLED: "true"
      RAG_QDRANT_CLOUD_INFERENCE: ${RAG_QDRANT_CLOUD_INFERENCE:-false}
      RAG_HYBRID_ENABLED: "true"
      RAG_RERANKER_ENABLED: "false"
      RAG_LLM_PLANNER_ENABLED: "true"
      ANALYSIS_ANSWER_MODE: ${ANALYSIS_ANSWER_MODE:-deterministic}
      ANALYSIS_SHADOW_SAMPLE_RATE: ${ANALYSIS_SHADOW_SAMPLE_RATE:-0.1}
      ANALYSIS_PROMPT_VERSION: ${ANALYSIS_PROMPT_VERSION:-v1}
      AI_PROVIDER: openrouter
      AI_BASE_URL: https://openrouter.ai/api/v1
      AI_API_KEY: ${AI_API_KEY:-}
      AI_CHAT_MODEL: ${AI_CHAT_MODEL:-nvidia/nemotron-3-ultra-550b-a55b:free}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_SUMMARY_MODEL: ${OPENROUTER_SUMMARY_MODEL:-nvidia/nemotron-3-ultra-550b-a55b:free}
      LOG_LEVEL: INFO
      LOG_JSON: "true"
      CORS_ORIGINS: '["http://localhost:5173", "http://localhost:3000"]'
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    command: ["/app/.venv/bin/uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "8080:8080"
    depends_on:
      - api

volumes:
  postgres_data:
  qdrant_data_v118:
