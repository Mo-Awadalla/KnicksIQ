services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: knicksiq
      POSTGRES_PASSWORD: knicksiq
      POSTGRES_DB: knicksiq
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knicksiq -d knicksiq"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.11.5
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "timeout 3 bash -c '</dev/tcp/127.0.0.1/6333'"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      DB_URL: postgresql+asyncpg://knicksiq:knicksiq@postgres:5432/knicksiq
      REDIS_URL: redis://redis:6379/0
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      RAG_QDRANT_ENABLED: "false"
      RAG_HYBRID_ENABLED: "false"
      RAG_RERANKER_ENABLED: "false"
      RAG_LLM_PLANNER_ENABLED: "false"
      AI_PROVIDER: mock
      AI_API_KEY: ""
      LOG_LEVEL: INFO
      LOG_JSON: "true"
      CORS_ORIGINS: '["http://localhost:5173", "http://localhost:3000"]'
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    command: ["/app/.venv/bin/uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      DB_URL: postgresql+asyncpg://knicksiq:knicksiq@postgres:5432/knicksiq
      REDIS_URL: redis://redis:6379/0
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      RAG_QDRANT_ENABLED: "false"
      RAG_HYBRID_ENABLED: "false"
      RAG_RERANKER_ENABLED: "false"
      RAG_LLM_PLANNER_ENABLED: "false"
      LOG_LEVEL: INFO
      LOG_JSON: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    command: ["uv", "run", "--package", "knicksiq-worker", "rq", "worker", "--url", "redis://redis:6379/0", "default"]

  mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    environment:
      DB_URL: postgresql+asyncpg://knicksiq:knicksiq@postgres:5432/knicksiq
      LOG_LEVEL: INFO
      LOG_JSON: "true"
      SSE_HOST: 0.0.0.0
      SSE_PORT: 8001
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
    command: ["uv", "run", "--package", "knicksiq-mcp", "python", "-m", "mcp_app.server", "--transport", "sse"]

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.web
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  postgres_data:
  qdrant_data:
