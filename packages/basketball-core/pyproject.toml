[project]
name = "knicksiq-basketball-core"
version = "0.1.0"
description = "KnicksIQ basketball domain logic (parsers, detectors, models)"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.6",
]

[project.optional-dependencies]
test = [
    "pytest>=8.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/basketball_core"]
