services:
  - type: keyvalue
    name: knicksiq-redis
    plan: free
    region: oregon
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru
    persistenceMode: "off"

  - type: web
    name: knicksiq-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile.api
    dockerContext: .
    healthCheckPath: /health/live
    autoDeployTrigger: off
    domains:
      - api.knicksiq.win
    envVars:
      - key: DB_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: knicksiq-redis
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: LOG_JSON
        value: "true"
      - key: REQUIRE_ACTIVE_RELEASE
        value: "true"
      - key: IP_HASH_SECRET
        generateValue: true
      - key: AI_PROVIDER
        value: openrouter
      - key: AI_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: AI_API_KEY
        sync: false
      - key: AI_CHAT_MODEL
        value: google/gemini-3.1-flash-lite
      - key: OPENROUTER_ALLOWED_MODELS
        value: '["google/gemini-3.1-flash-lite"]'
      - key: OPENROUTER_SUMMARY_MODEL
        value: google/gemini-3.1-flash-lite
      - key: OPENROUTER_MONTHLY_CUTOFF_USD
        value: "8"
      - key: SENTRY_DSN
        sync: false
      - key: CORS_ORIGINS
        value: '["https://www.knicksiq.win"]'
      - key: PUBLIC_WEB_ORIGIN
        value: https://www.knicksiq.win
      - key: TRUSTED_HOSTS
        value: '["api.knicksiq.win","127.0.0.1","localhost"]'
      - key: RAG_QDRANT_ENABLED
        value: "false"
      - key: RAG_QDRANT_CLOUD_INFERENCE
        value: "false"
      - key: RAG_HYBRID_ENABLED
        value: "false"
      - key: RAG_RERANKER_ENABLED
        value: "false"
      - key: RAG_LLM_PLANNER_ENABLED
        value: "true"

  - type: web
    name: knicksiq-web
    runtime: static
    buildCommand: cd apps/web && corepack enable pnpm && pnpm install --frozen-lockfile && pnpm build
    staticPublishPath: apps/web/dist
    autoDeployTrigger: off
    domains:
      - www.knicksiq.win
    envVars:
      - key: NODE_VERSION
        value: 24.4.1
      - key: VITE_API_URL
        value: https://api.knicksiq.win
      - key: VITE_PUBLIC_URL
        value: https://www.knicksiq.win
      - key: VITE_SENTRY_DSN
        sync: false
    headers:
      - path: /*
        name: Content-Security-Policy
        value: "default-src 'self'; connect-src 'self' https://api.knicksiq.win; img-src 'self' data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; frame-ancestors 'none'; base-uri 'self'; form-action https://formspree.io"
      - path: /*
        name: Strict-Transport-Security
        value: max-age=31536000; includeSubDomains
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
