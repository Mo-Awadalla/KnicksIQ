services:
  - type: web
    name: knicksiq-api
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile.api
    dockerContext: .
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: DB_URL
        fromDatabase:
          name: knicksiq-postgres
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: LOG_JSON
        value: "true"
      - key: SEED_ON_STARTUP
        value: "true"
      - key: ADMIN_API_KEY
        generateValue: true
      - key: AI_PROVIDER
        value: mock
      - key: AI_API_KEY
        value: ""
      - key: CORS_ORIGINS
        value: '["https://knicksiq-web.onrender.com"]'
      - key: RAG_QDRANT_ENABLED
        value: "false"
      - key: RAG_HYBRID_ENABLED
        value: "false"
      - key: RAG_RERANKER_ENABLED
        value: "false"
      - key: RAG_LLM_PLANNER_ENABLED
        value: "false"

  - type: web
    name: knicksiq-web
    runtime: static
    buildCommand: cd apps/web && corepack enable pnpm && pnpm install --frozen-lockfile && pnpm build
    staticPublishPath: apps/web/dist
    autoDeployTrigger: commit
    envVars:
      - key: VITE_API_URL
        value: https://knicksiq-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: knicksiq-postgres
    databaseName: knicksiq
    user: knicksiq
    plan: basic-256mb
    postgresMajorVersion: "16"
    ipAllowList: []
