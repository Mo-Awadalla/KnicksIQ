<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="/images/favicon.svg"
      media="(prefers-color-scheme: light)"
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="/images/favicon_light.svg"
      media="(prefers-color-scheme: dark)"
    />
    <link
      rel="icon"
      type="image/png"
      href="/images/favicon.png"
      media="(prefers-color-scheme: light)"
    />
    <link
      rel="icon"
      type="image/png"
      href="/images/favicon_light.png"
      media="(prefers-color-scheme: dark)"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="canonical" href="https://www.knicksiq.win/" />

    <!-- Primary Meta Tags -->
    <title>KnicksIQ Season Archive</title>
    <meta name="title" content="KnicksIQ Season Archive" />
    <meta
      name="description"
      content="Ask grounded Knicks season questions and review receipts from the available game data."
    />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.knicksiq.win/" />
    <meta property="og:title" content="KnicksIQ Season Archive" />
    <meta
      property="og:description"
      content="Ask grounded Knicks season questions and review receipts from the available game data."
    />
    <meta
      property="og:image"
      content="https://www.knicksiq.win/images/favicon.png"
    />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://www.knicksiq.win/" />
    <meta property="twitter:title" content="KnicksIQ Season Archive" />
    <meta
      property="twitter:description"
      content="Ask grounded Knicks season questions and review receipts from the available game data."
    />
    <meta
      property="twitter:image"
      content="https://www.knicksiq.win/images/favicon.png"
    />

    <!-- Licensed display/UI faces resolve locally when installed; IBM Plex Mono
         is the production-safe face for scores, stats, and timestamps. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />

    <meta name="theme-color" content="#081b2d" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
